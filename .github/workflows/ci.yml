name: CI

# Gate every push and PR to main on Rust formatting, clippy, dependency audit,
# the full backend/web check, and an independently locked Expo mobile check.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref so only the latest commit is checked.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  check:
    name: bun run check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Documented runtime dependency (ffprobe/ffmpeg power probing + transcode).
      # No current test shells out to it, but install for parity and to keep any
      # future ffmpeg-touching test green.
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      # edition = "2024" needs a recent stable Rust (>= 1.85); @stable tracks it.
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Audit Rust dependencies
        uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # frontend-smoke.mjs launches headless Chromium; --with-deps pulls the
      # Linux system libraries the browser needs on the CI runner.
      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      # lint:frontend && build && check:architecture && test:rust && test:worker && test:frontend
      - name: Run full check
        run: bun run check

  mobile:
    name: Mobile checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        run: npm ci

      - name: Typecheck mobile app
        run: npm run typecheck

      - name: Lint mobile app
        run: npm run lint

      - name: Test mobile configuration
        run: npm test

      - name: Validate Expo project
        run: npm run doctor

      - name: Bundle iOS app
        run: npm run build:ios
