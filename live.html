<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="theme-color" content="#000000" />
        <meta name="mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="StreamArena" />
        <title>StreamArena</title>
        <link rel="manifest" href="/manifest.webmanifest" />
        <link rel="icon" type="image/svg+xml" href="/assets/icons/streamarena-favicon.svg" />
        <link rel="icon" type="image/png" sizes="192x192" href="/assets/icons/streamarena-favicon-192.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/assets/icons/streamarena-app-icon-180.png" />
        <!-- Live HLS is fetched cross-origin from the Cloudflare Worker proxy;
             warming DNS+TCP+TLS here takes that handshake off the first playlist
             fetch's critical path. `crossorigin` matters: hls.js loads in CORS mode,
             and a non-CORS preconnect opens a socket the CORS fetch cannot reuse.
             live.streamarena.xyz is the zone-routed worker alias being rolled out;
             preconnecting before it serves traffic is harmless. -->
        <link rel="preconnect" href="https://streamarena-live-hls-proxy.erlinhoxha.workers.dev" crossorigin />
        <link rel="preconnect" href="https://live.streamarena.xyz" crossorigin />
        <script type="module" src="/src-ui/entries/live.js"></script>
    </head>
    <body></body>
</html>
